name: Update Helm Chart Image Tag

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      github_org:
        required: false
        type: string
        default: aGora-Ops
      aws_region:
        required: false
        type: string
        default: us-east-1

jobs:
  update-helm-values:
    name: Update ${{ inputs.service_name }} → ${{ inputs.image_tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout agora-helm
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.github_org }}/agora-helm
          token: ${{ secrets.HELM_CHARTS_TOKEN }}
          ref: main

      - name: Update image repository + tag in values file
        run: |
          SERVICE="${{ inputs.service_name }}"
          TAG="${{ inputs.image_tag }}"
          REPO_URL="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com/${SERVICE}"

          # develop -> the live dev cluster's values; main -> values reserved
          # for the (not-yet-deployed) prod cluster. Derived purely from the
          # ref that triggered this build, not a caller-supplied branch name.
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            VALUES_FILE="charts/${SERVICE}/values.dev.yaml"
          else
            VALUES_FILE="charts/${SERVICE}/values.prod.yaml"
          fi

          if [ ! -f "$VALUES_FILE" ]; then
            echo "Error: $VALUES_FILE not found"
            exit 1
          fi

          sed -i "s|^  repository: .*|  repository: \"${REPO_URL}\"|" "$VALUES_FILE"
          sed -i "s/^  tag: .*/  tag: \"${TAG}\"/" "$VALUES_FILE"

          # mainAccountId backs the ServiceAccount's IRSA role-arn annotation
          # (agora-api/webhook/worker only — mcp-github/frontend don't have an
          # IRSA role and won't have this field). Without this, the account ID
          # used for repository: above would update on every deploy but the
          # IAM role-arn would silently keep pointing at the OLD account.
          if grep -q "^  mainAccountId:" "$VALUES_FILE"; then
            sed -i "s/^  mainAccountId: .*/  mainAccountId: \"${{ secrets.AWS_ACCOUNT_ID }}\"/" "$VALUES_FILE"
          fi

          echo "Updated ${VALUES_FILE}:"
          cat "$VALUES_FILE"

      - name: Commit and push
        run: |
          git config user.name "agora-bot"
          git config user.email "bot@agora-ops.github.com"
          git add .
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore(${{ inputs.service_name }}): bump image to ${{ inputs.image_tag }}"
          git push
