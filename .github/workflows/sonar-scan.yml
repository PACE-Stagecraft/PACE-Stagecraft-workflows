name: SonarCloud Scan

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      working-directory:
        required: false
        type: string
        default: "."
      sonar_organization:
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        with:
          projectBaseDir: ${{ inputs.working-directory }}
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_organization }}_${{ inputs.service_name }}
            -Dsonar.organization=${{ inputs.sonar_organization }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
